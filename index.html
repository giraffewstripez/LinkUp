<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkUp: Event Finder</title>
    <link rel="stylesheet" type="text/css" href="css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header">
        <h1 class="Logo">LinkUp</h1>
    </div>



    <div class="Intro">   
        <div class="circle1"> </div>
        <div class="circle2"> </div>
        <div class="circle3"> </div>      
        <div class="circle4"> </div>
        <div class="circle5"> </div>

    </div>


    <div class="cat-details">
        <h1>So many oppurtunities, one LinkUp</h1>
        <div class="cat1"><p>Queer Lead</p></div>
        <div class="cat2"><p>POC Dominated</p></div>
        <div class="cat3"><p>Young & Turnt</p></div>
        <div class="cat4"><p>Family Oriented</p></div>
    </div>



    <div class="Manhattan"></div>



    <div class="Brooklyn"></div>



    <div id="event-popup" class="popup hidden">
        <div class="popup-content">
            <button id="close-popup">×</button>

            <h2 id="popup-name"></h2>
            <p id="popup-description"></p>

            <p><strong>Date:</strong> <span id="popup-date"></span></p>
            <p><strong>Time:</strong> <span id="popup-time"></span></p>
            <p><strong>Location:</strong> <span id="popup-location"></span></p>
            <p><strong>Cost:</strong> <span id="popup-cost"></span></p>

            <a id="popup-url" href="#" target="_blank">Event Link</a>
        </div>
    </div>





    <script src="app.js"></script>


</body>
</html>
